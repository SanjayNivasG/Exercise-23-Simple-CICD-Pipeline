apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: simple-app

spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/Exercise-23-Simple-CICD-Pipeline.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
