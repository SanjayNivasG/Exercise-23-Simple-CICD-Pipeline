apiVersion: apps/v1
kind: Deployment

metadata:
  name: simple-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: simple-app

  template:
    metadata:
      labels:
        app: simple-app

    spec:
      containers:
      - name: simple-app
        image: sanjaynivasg/simple-cicd:v1

        ports:
        - containerPort: 5000
